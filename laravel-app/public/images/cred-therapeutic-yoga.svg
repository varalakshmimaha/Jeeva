<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none">
  <rect width="200" height="160" rx="16" fill="#f8f5fa"/>
  <circle cx="100" cy="55" r="40" fill="#4DB6AC" fill-opacity="0.08"/>
  <!-- Meditation/healing pose -->
  <g transform="translate(100,50)" stroke="#4DB6AC" stroke-width="2" stroke-linecap="round" fill="none">
    <!-- Head -->
    <circle cx="0" cy="-32" r="8" fill="#4DB6AC" fill-opacity="0.15"/>
    <!-- Body -->
    <line x1="0" y1="-24" x2="0" y2="-2"/>
    <!-- Crossed legs (lotus) -->
    <path d="M0,-2 Q-12,5 -20,2"/>
    <path d="M0,-2 Q12,5 20,2"/>
    <!-- Hands on knees -->
    <path d="M0,-18 Q-18,-12 -20,2"/>
    <path d="M0,-18 Q18,-12 20,2"/>
    <!-- Healing energy circles -->
    <circle cx="0" cy="-10" r="20" stroke="#4DB6AC" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="3,3"/>
    <circle cx="0" cy="-10" r="28" stroke="#f0c4c4" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="4,4"/>
    <!-- Sparkles -->
    <circle cx="-15" cy="-35" r="1.5" fill="#4DB6AC" fill-opacity="0.3"/>
    <circle cx="15" cy="-35" r="1.5" fill="#4DB6AC" fill-opacity="0.3"/>
    <circle cx="0" cy="-45" r="2" fill="#f0c4c4" fill-opacity="0.4"/>
  </g>
  <text x="100" y="115" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#3d2b2b" font-weight="600">Healing Yoga</text>
  <text x="100" y="130" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#7a6060">Infertility &amp; Menopause</text>
</svg>