    <path d="M-3,-28 L-3,-25 L3,-25 L3,-28" stroke="#e8b4b4" stroke-width="1"/>
    <path d="M0,-42 L0,-38" stroke="#4DB6AC" stroke-width="1" stroke-opacity="0.5"/>
    <path d="M-6,-40 L-4,-37" stroke="#4DB6AC" stroke-width="1" stroke-opacity="0.5"/>
    <path d="M6,-40 L4,-37" stroke="#4DB6AC" stroke-width="1" stroke-opacity="0.5"/>
  </g>
  <text x="100" y="115" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#3d2b2b" font-weight="600">Evidence-Based</text>
  <text x="100" y="130" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#7a6060">Knowledge &amp; Confidence</text>
