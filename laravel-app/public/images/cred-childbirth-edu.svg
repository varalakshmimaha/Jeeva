    <!-- Text lines on book -->
    <line x1="-28" y1="-10" x2="-8" y2="-12" stroke="#4DB6AC" stroke-width="1" stroke-opacity="0.4"/>
    <line x1="-28" y1="-3" x2="-8" y2="-5" stroke="#4DB6AC" stroke-width="1" stroke-opacity="0.4"/>
    <line x1="-28" y1="4" x2="-12" y2="2" stroke="#4DB6AC" stroke-width="1" stroke-opacity="0.4"/>
    <line x1="8" y1="-12" x2="28" y2="-10" stroke="#4DB6AC" stroke-width="1" stroke-opacity="0.4"/>
    <line x1="8" y1="-5" x2="28" y2="-3" stroke="#4DB6AC" stroke-width="1" stroke-opacity="0.4"/>
