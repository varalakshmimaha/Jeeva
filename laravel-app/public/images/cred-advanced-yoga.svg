<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none">
  <rect width="200" height="160" rx="16" fill="#f0faf9"/>
  <circle cx="100" cy="55" r="40" fill="#4DB6AC" fill-opacity="0.08"/>
  <!-- Advanced tree pose -->
  <g transform="translate(100,52)" stroke="#4DB6AC" stroke-width="2" stroke-linecap="round" fill="none">
    <!-- Head -->
    <circle cx="0" cy="-42" r="8" fill="#4DB6AC" fill-opacity="0.15"/>
    <!-- Body -->
    <line x1="0" y1="-34" x2="0" y2="-5"/>
    <!-- Standing leg -->
    <line x1="0" y1="-5" x2="0" y2="20"/>
    <!-- Bent leg (tree) -->
    <path d="M0,-5 Q12,-2 10,8 Q8,12 0,5"/>
    <!-- Arms up in namaste -->
    <path d="M0,-28 Q-15,-38 -10,-48"/>
    <path d="M0,-28 Q15,-38 10,-48"/>
    <path d="M-10,-48 Q0,-53 10,-48" stroke-width="1.5"/>
    <!-- Star/achievement badge -->
    <g transform="translate(22,-30)">
      <polygon points="0,-8 2,-3 7,-3 3,1 5,7 0,3 -5,7 -3,1 -7,-3 -2,-3" fill="#f5d5d5" stroke="#e8b4b4" stroke-width="0.8"/>
    </g>
    <!-- Foot -->
    <line x1="-5" y1="20" x2="5" y2="20" stroke-width="1.5"/>
    <!-- Energy lines -->
    <path d="M-25,-15 Q-30,-25 -22,-30" stroke="#4DB6AC" stroke-opacity="0.2" stroke-width="1"/>
    <path d="M25,-15 Q30,-25 22,-30" stroke="#4DB6AC" stroke-opacity="0.2" stroke-width="1"/>
  </g>
  <text x="100" y="118" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#3d2b2b" font-weight="600">Advanced Training</text>
  <text x="100" y="133" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#7a6060">Expert Level Certification</text>
</svg>