<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5d5d5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f0c4c4" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="tealG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4DB6AC"/>
      <stop offset="100%" stop-color="#80cbc4"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4DB6AC" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#4DB6AC" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Soft background -->
  <rect width="600" height="400" fill="#fefaf9"/>
  <rect width="600" height="400" fill="url(#bgGrad)"/>

  <!-- Mandala circles -->
  <circle cx="300" cy="180" r="140" stroke="#4DB6AC" stroke-opacity="0.1" stroke-width="1" fill="none"/>
  <circle cx="300" cy="180" r="110" stroke="#4DB6AC" stroke-opacity="0.07" stroke-width="1" fill="none"/>
  <circle cx="300" cy="180" r="80" stroke="#f0c4c4" stroke-opacity="0.2" stroke-width="1" fill="none"/>

  <!-- Glow -->
  <circle cx="300" cy="180" r="100" fill="url(#glow)"/>

  <!-- Yoga figure — Lotus / Meditation Pose -->
  <g transform="translate(300, 180)" stroke="#3d2b2b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Head -->
    <circle cx="0" cy="-65" r="16" fill="#3d2b2b" fill-opacity="0.15" stroke="#3d2b2b" stroke-width="2"/>

    <!-- Body -->
    <line x1="0" y1="-48" x2="0" y2="5"/>

    <!-- Left arm — resting on knee -->
    <path d="M0,-35 Q-30,-20 -45,0"/>

    <!-- Right arm — resting on knee -->
    <path d="M0,-35 Q30,-20 45,0"/>

    <!-- Crossed legs -->
    <path d="M0,5 Q-20,15 -40,10 Q-55,8 -50,20"/>
    <path d="M0,5 Q20,15 40,10 Q55,8 50,20"/>
    <path d="M-50,20 Q-30,30 -10,22"/>
    <path d="M50,20 Q30,30 10,22"/>
  </g>

  <!-- Lotus petals below the figure -->
  <g transform="translate(300, 270)" opacity="0.6">
    <path d="M0,-8 Q-20,-20 -30,-5 Q-32,5 -15,12 Q-8,15 0,12" fill="#f5d5d5" stroke="#e8b4b4" stroke-width="0.8"/>
    <path d="M0,-8 Q20,-20 30,-5 Q32,5 15,12 Q8,15 0,12" fill="#f5d5d5" stroke="#e8b4b4" stroke-width="0.8"/>
    <path d="M0,-12 Q-12,-25 0,-8 Q12,-25 0,-12" fill="#4DB6AC" fill-opacity="0.25" stroke="none"/>
  </g>

  <!-- Decorative elements -->
  <!-- Small certificate/scroll icons scattered -->

  <!-- Certificate icon left -->
  <g transform="translate(100, 120)" opacity="0.35">
    <rect x="-18" y="-22" width="36" height="44" rx="4" stroke="#4DB6AC" stroke-width="1.5" fill="none"/>
    <line x1="-10" y1="-10" x2="10" y2="-10" stroke="#4DB6AC" stroke-width="1"/>
    <line x1="-10" y1="-2" x2="10" y2="-2" stroke="#4DB6AC" stroke-width="1"/>
    <line x1="-10" y1="6" x2="5" y2="6" stroke="#4DB6AC" stroke-width="1"/>
    <circle cx="0" cy="15" r="5" stroke="#4DB6AC" stroke-width="1" fill="none"/>
  </g>

  <!-- Book icon right -->
  <g transform="translate(500, 140)" opacity="0.35">
    <path d="M-18,-15 L-18,15 Q0,10 18,15 L18,-15 Q0,-20 -18,-15Z" stroke="#4DB6AC" stroke-width="1.5" fill="none"/>
    <line x1="0" y1="-17" x2="0" y2="13" stroke="#4DB6AC" stroke-width="1"/>
  </g>

  <!-- Heart icon top -->
  <g transform="translate(420, 80)" opacity="0.3">
    <path d="M0,8 C-3,3 -10,-3 -7,-8 C-4,-13 0,-10 0,-6 C0,-10 4,-13 7,-8 C10,-3 3,3 0,8Z" stroke="#e8b4b4" stroke-width="1.5" fill="#f5d5d5" fill-opacity="0.5"/>
  </g>

  <!-- Star icon -->
  <g transform="translate(180, 80)" opacity="0.3">
    <polygon points="0,-10 3,-3 10,-3 4,2 6,10 0,5 -6,10 -4,2 -10,-3 -3,-3" stroke="#4DB6AC" stroke-width="1" fill="#4DB6AC" fill-opacity="0.15"/>
  </g>

  <!-- Sparkle dots -->
  <g fill="#4DB6AC" fill-opacity="0.2">
    <circle cx="150" cy="250" r="3"/>
    <circle cx="450" cy="260" r="2.5"/>
    <circle cx="520" cy="200" r="2"/>
    <circle cx="80" cy="200" r="2"/>
    <circle cx="200" cy="320" r="2"/>
    <circle cx="400" cy="310" r="3"/>
  </g>

  <!-- Sparkle stars -->
  <g fill="#4DB6AC" fill-opacity="0.2">
    <path d="M130,300 l1.5,-4.5 1.5,4.5 4.5,1.5 -4.5,1.5 -1.5,4.5 -1.5,-4.5 -4.5,-1.5z"/>
    <path d="M470,300 l1.5,-4.5 1.5,4.5 4.5,1.5 -4.5,1.5 -1.5,4.5 -1.5,-4.5 -4.5,-1.5z"/>
  </g>

  <!-- Bottom text area hint -->
  <text x="300" y="360" text-anchor="middle" font-family="serif" font-size="16" fill="#3d2b2b" fill-opacity="0.12" letter-spacing="6">CERTIFIED &amp; TRAINED</text>
</svg>